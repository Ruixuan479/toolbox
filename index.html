    const sorted=weights.slice().sort((a,b)=>a.date<b.date?-1:1);
    // 当前 + 变化
    const cur=document.getElementById('bCurrent');
    if(!sorted.length){ cur.innerHTML=`<div class="hint">还没有体重记录，点右上角「记体重」</div>`; }
    else{
      const latest=sorted[sorted.length-1], prev=sorted[sorted.length-2];
      let delta='';
      if(prev){ const d=(latest.kg-prev.kg); const cls=d>0?'up':(d<0?'down':''); const sign=d>0?'+':''; delta=`<div class="wc-delta ${cls}">较上次 ${sign}${d.toFixed(1)} kg</div>`; }
      cur.innerHTML=`<div class="wc-kg">${latest.kg}<span class="u"> kg</span></div>${delta}<div class="hint" style="margin-top:6px;">${latest.date}</div>`;
    }
    drawChart(sorted);
    // 列表
    const log=document.getElementById('bLog');
    if(!sorted.length){ log.innerHTML=''; return; }
    log.innerHTML=sorted.slice().reverse().map(w=>`<div class="wl-row"><span class="wl-d">${w.date}</span><span class="wl-v">${w.kg} kg</span><span class="wl-del" data-id="${w.id}">删除</span></div>`).join('');
    log.querySelectorAll('.wl-del').forEach(b=>b.addEventListener('click',()=>{ weights=weights.filter(x=>x.id!==Number(b.dataset.id)); saveData(); render(); toast('已删除'); }));
  }

  function drawChart(sorted){
    const canvas=document.getElementById('bChart');
    const labels=sorted.map(w=>w.date.slice(5)); const dataPts=sorted.map(w=>w.kg);
    // 优先使用 Chart.js；不可用则降级为原生 Canvas
    if(window.Chart){
      if(chart){ chart.destroy(); chart=null; }
      if(!sorted.length){ clearCanvas(canvas); return; }
      chart=new Chart(canvas,{ type:'line',
        data:{ labels, datasets:[{ data:dataPts, borderColor:'#C2873B', backgroundColor:'rgba(194,135,59,.12)', fill:true, tension:.3, pointBackgroundColor:'#A1652A', pointRadius:4, borderWidth:2 }] },
        options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
          scales:{ x:{grid:{display:false},ticks:{color:'#7C746A',font:{size:11}}}, y:{grid:{color:'#EFE8DA'},ticks:{color:'#7C746A',font:{size:11}}} } }
      });
    } else {
      drawCanvasLine(canvas, labels, dataPts);
    }
  }
  function clearCanvas(c){ const x=c.getContext('2d'); x.clearRect(0,0,c.width,c.height); }
  // 原生 Canvas 折线（离线降级）
  function drawCanvasLine(canvas, labels, pts){
    const dpr=window.devicePixelRatio||1; const W=canvas.clientWidth||canvas.parentElement.clientWidth, H=220;
    canvas.width=W*dpr; canvas.height=H*dpr; const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
    ctx.clearRect(0,0,W,H);
    if(!pts.length){ ctx.fillStyle='#A8A095'; ctx.font="13px 'Noto Sans SC'"; ctx.textAlign='center'; ctx.fillText('暂无数据',W/2,H/2); return; }
    const pad={l:36,r:12,t:14,b:24};
    const min=Math.min(...pts)-1, max=Math.max(...pts)+1, range=max-min||1;
    const xw=(W-pad.l-pad.r), yh=(H-pad.t-pad.b);
    const X=i=>pad.l + (pts.length===1?xw/2:xw*i/(pts.length-1));
    const Y=v=>pad.t + yh*(1-(v-min)/range);
    // 网格
    ctx.strokeStyle='#EFE8DA'; ctx.lineWidth=1; ctx.fillStyle='#7C746A'; ctx.font="10px 'Noto Sans SC'"; ctx.textAlign='right'; ctx.textBaseline='middle';
    for(let i=0;i<=3;i++){ const v=min+range*i/3, y=Y(v); ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke(); ctx.fillText(v.toFixed(1),pad.l-6,y); }
    // 填充
    ctx.beginPath(); ctx.moveTo(X(0),Y(pts[0])); pts.forEach((v,i)=>ctx.lineTo(X(i),Y(v)));
    ctx.lineTo(X(pts.length-1),H-pad.b); ctx.lineTo(X(0),H-pad.b); ctx.closePath(); ctx.fillStyle='rgba(194,135,59,.12)'; ctx.fill();
    // 线
    ctx.beginPath(); ctx.moveTo(X(0),Y(pts[0])); pts.forEach((v,i)=>ctx.lineTo(X(i),Y(v))); ctx.strokeStyle='#C2873B'; ctx.lineWidth=2; ctx.stroke();
    // 点 + x标签
    ctx.fillStyle='#A1652A'; ctx.textAlign='center'; ctx.textBaseline='top';
    pts.forEach((v,i)=>{ ctx.beginPath();ctx.arc(X(i),Y(v),3.5,0,7);ctx.fill(); });
    ctx.fillStyle='#7C746A';
    const step=Math.ceil(labels.length/6);
    labels.forEach((l,i)=>{ if(i%step===0||i===labels.length-1) ctx.fillText(l,X(i),H-pad.b+5); });
  }

  // 弹窗
  let sheet;
  function buildSheet(){
    sheet=document.createElement('div'); sheet.className='sheet';
    sheet.innerHTML=`<div class="sheet-grip"></div>
      <div class="sheet-head"><h3>记录体重</h3><button class="sheet-close" data-close>×</button></div>
      <div class="sheet-body"><form id="bForm" autocomplete="off">
        <div class="field"><label>日期</label><input type="date" id="bfDate" required></div>
        <div class="field"><label>体重 (kg)</label><input type="number" id="bfKg" step="0.1" min="0" placeholder="例如 65.5" required></div>
        <div class="form-actions"><button type="submit" class="btn btn-primary btn-block">保存</button></div>
      </form></div>`;
    document.body.appendChild(sheet);
    sheet.querySelector('[data-close]').addEventListener('click',()=>closeSheet(sheet));
    document.getElementById('bForm').addEventListener('submit',e=>{
      e.preventDefault();
      const date=document.getElementById('bfDate').value, kg=parseFloat(document.getElementById('bfKg').value);
      if(!date||!(kg>0)){ toast('请填写有效日期和体重'); return; }
      // 同一天覆盖
      const exist=weights.find(w=>w.date===date);
      if(exist) exist.kg=kg; else weights.push({id:U.uid(),date,kg});
      saveData(); closeSheet(sheet); render(); toast('已记录');
    });
  }
  function openWeightForm(){ document.getElementById('bForm').reset(); document.getElementById('bfDate').value=U.today(); openSheet(sheet); }
})();
</script>


<!-- =========================================================================
     js/modules/habits.js  —— 习惯追踪器（周视图打卡 / 频率 / 连续 / 热力图）
     导出 initHabits()；并暴露 window.getTodayHabitCompletion()
========================================================================= -->
<script>
(function(){
  let config, log;                 // habits_config(数组) / habits_log(对象 date->{id:true})
  let weekStart;                   // 当前周的周一(Date)
  let selectedHabit=null;          // 详情选中的习惯 id
  let bound=false;
  const WD=['周一','周二','周三','周四','周五','周六','周日'];
  const EMOJIS=['📖','💧','🏃','🧘','💪','🍎','😴','🌅','✍️','🧹','💊','☕','🎯','🚭','🦷','🌱'];

  function loadData(){
    config=Storage.get('habits_config',[]);
    log=Storage.get('habits_log',{});
  }
  function saveConfig(){ Storage.set('habits_config',config); }
  function saveLog(){ Storage.set('habits_log',log); }

  // —— 日期工具 ——
  function mondayOf(d){ const x=new Date(d); x.setHours(0,0,0,0); const off=(x.getDay()+6)%7; x.setDate(x.getDate()-off); return x; }
  function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
  function isFuture(iso){ return iso>U.today(); }
  function weekDates(start){ return Array.from({length:7},(_,i)=>U.toISO(addDays(start,i))); }
  function isDone(habitId,iso){ return !!(log[iso] && log[iso][habitId]); }

  function activeHabits(){ return config.filter(h=>!h.archived); }
  function archivedHabits(){ return config.filter(h=>h.archived); }

  // 频率文案 + 本周目标次数
  function freqLabel(h){
    if(h.freq.type==='daily') return '每天';
    if(h.freq.type==='weekly') return `每周 ${h.freq.times} 次`;
    return `每 ${h.freq.interval} 天`;
  }
  function weekTarget(h){
    if(h.freq.type==='daily') return 7;
    if(h.freq.type==='weekly') return h.freq.times;
    return Math.max(1, Math.floor(7/(h.freq.interval||1)));
  }
  function weekDoneCount(h,start){ return weekDates(start).reduce((s,iso)=>s+(isDone(h.id,iso)?1:0),0); }
  function isMetThisWeek(h,start){ return weekDoneCount(h,start) >= weekTarget(h); }

  // —— 对外初始化入口 ——
  window.initHabits=function(){
    loadData();
    if(!weekStart) weekStart=mondayOf(new Date());
    const root=document.getElementById('module-habits');
    if(!bound){
      root.innerHTML=`
        <div class="page-head-row">
          <div><div class="page-title">习惯</div><div class="page-sub" id="hSub"></div></div>
          <button class="add-btn" id="hAdd"><span class="plus">＋</span>添加习惯</button>
        </div>
        <div class="habit-week-nav">
          <button id="hPrev">‹ 上周</button>
          <div class="wk-label" id="hWkLabel"></div>
          <button id="hNext">下周 ›</button>
        </div>
        <div id="hGrid"></div>
        <div id="hDetail" class="habit-detail"></div>
        <div id="hArchived" class="habit-archived"></div>
        <div class="card" style="margin-top:18px;"><div style="font-weight:600;margin-bottom:4px;">年度热力图</div><div class="hint" style="margin-bottom:12px;">颜色越深表示当日习惯完成度越高</div><div id="hHeat"></div></div>`;
      root.querySelector('#hAdd').addEventListener('click',()=>openHabitForm());
      root.querySelector('#hPrev').addEventListener('click',()=>{ weekStart=addDays(weekStart,-7); render(); });
      root.querySelector('#hNext').addEventListener('click',()=>{ weekStart=addDays(weekStart,7); render(); });
      buildSheet();
      bound=true;
    }
    render();
  };

  function render(){
    document.getElementById('hSub').textContent=`共 ${activeHabits().length} 个进行中习惯`;
    renderWeekLabel();
    renderGrid();
    renderDetail();
    renderArchived();
    renderHeat();
  }

  function renderWeekLabel(){
    const days=weekDates(weekStart);
    const thisMon=U.toISO(mondayOf(new Date()));
    const isThis=days[0]===thisMon;
    const a=U.parseISO(days[0]), b=U.parseISO(days[6]);
    document.getElementById('hWkLabel').innerHTML=
      `<span class="${isThis?'wk-today':''}">${isThis?'本周':(days[0]>thisMon?'未来一周':'过往一周')}</span>
       <span class="wk-sub">${a.getMonth()+1}/${a.getDate()} – ${b.getMonth()+1}/${b.getDate()}</span>`;
  }

  /* ---------- 周视图网格 ---------- */
  function renderGrid(){
    const host=document.getElementById('hGrid');
    const habits=activeHabits();
    const days=weekDates(weekStart);
    const today=U.today();
    if(!habits.length){
      host.innerHTML=`<div class="empty-state"><div class="em-ill">习</div><p>还没有习惯<br>点右上角「添加习惯」开始</p></div>`;
      return;
    }
    // 表头
    let head=`<div class="hg-row hg-head"><div class="hg-cell hg-name">习惯</div>`;
    days.forEach((iso,i)=>{ const d=U.parseISO(iso);
      head+=`<div class="hg-cell hg-dayhead ${iso===today?'today':''}"><span class="d-w">${WD[i].slice(1)}</span><span class="d-n">${d.getDate()}</span></div>`; });
    head+=`</div>`;
    // 习惯行
    let rows='';
    habits.forEach(h=>{
      const met=h.freq.type!=='daily' && isMetThisWeek(h,weekStart);
      let cells='';
      days.forEach(iso=>{
        const fut=isFuture(iso), done=isDone(h.id,iso);
        cells+=`<div class="hg-check ${done?'done':''} ${iso===today?'today-col':''} ${fut?'future':''}" data-h="${h.id}" data-d="${iso}">
          <span class="mark">${done?'✓':''}</span></div>`;
      });
      rows+=`<div class="hg-row ${met?'met':''}">
        <div class="hg-cell hg-name" draggable="true" data-h="${h.id}">
          <span class="h-ico">${h.icon||'🎯'}</span>
          <span class="h-info"><span class="h-nm">${U.esc(h.name)}</span><span class="h-fq">${freqLabel(h)}${h.freq.type!=='daily'?` · ${weekDoneCount(h,weekStart)}/${weekTarget(h)}`:''}</span></span>
        </div>${cells}</div>`;
    });
    host.innerHTML=`<div class="habit-grid-wrap"><div class="habit-grid">${head}${rows}</div></div>`;

    // 打卡切换
    host.querySelectorAll('.hg-check').forEach(c=>{
      if(c.classList.contains('future')) return;
      c.addEventListener('click',()=>{
        const id=Number(c.dataset.h), iso=c.dataset.d;
        if(!log[iso]) log[iso]={};
        if(log[iso][id]){ delete log[iso][id]; if(!Object.keys(log[iso]).length) delete log[iso]; }
        else log[iso][id]=true;
        saveLog(); render();
      });
    });
    // 习惯名：点击看详情
    host.querySelectorAll('.hg-name[data-h]').forEach(n=>{
      n.addEventListener('click',e=>{ if(n.getAttribute('dragging'))return; selectedHabit=Number(n.dataset.h); renderDetail(true); });
    });
    bindDrag(host);
  }

  // 拖拽排序（简单实现）
  let dragId=null;
  function bindDrag(host){
    host.querySelectorAll('.hg-name[draggable=true]').forEach(n=>{
      n.addEventListener('dragstart',e=>{ dragId=Number(n.dataset.h); n.setAttribute('dragging','1'); e.dataTransfer.effectAllowed='move'; });
      n.addEventListener('dragend',()=>{ n.removeAttribute('dragging'); host.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over')); });
      n.addEventListener('dragover',e=>{ e.preventDefault(); n.classList.add('drag-over'); });
      n.addEventListener('dragleave',()=>n.classList.remove('drag-over'));
      n.addEventListener('drop',e=>{
        e.preventDefault(); n.classList.remove('drag-over');
        const targetId=Number(n.dataset.h);
        if(dragId==null||dragId===targetId) return;
        const from=config.findIndex(h=>h.id===dragId), to=config.findIndex(h=>h.id===targetId);
        const [moved]=config.splice(from,1); config.splice(to,0,moved);
        saveConfig(); render();
      });
    });
  }

  /* ---------- 连续天数 ---------- */
  function currentStreak(h){
    let n=0, cur=new Date(); cur.setHours(0,0,0,0);
    if(!isDone(h.id,U.toISO(cur))){ cur=addDays(cur,-1); if(!isDone(h.id,U.toISO(cur))) return 0; }
    while(isDone(h.id,U.toISO(cur))){ n++; cur=addDays(cur,-1); }
    return n;
  }
  function longestStreak(h){
    const dates=Object.keys(log).filter(d=>log[d][h.id]).sort();
    if(!dates.length) return 0;
    let best=1,run=1;
    for(let i=1;i<dates.length;i++){
      const prev=U.parseISO(dates[i-1]), curr=U.parseISO(dates[i]);
      if((curr-prev)===86400000){ run++; best=Math.max(best,run); } else run=1;
    }
    return best;
  }

  /* ---------- 选中习惯详情 ---------- */
  function renderDetail(scroll){
    const host=document.getElementById('hDetail');
    const h=config.find(x=>x.id===selectedHabit && !x.archived);
    if(!h){ host.innerHTML=''; return; }
    host.innerHTML=`
      <div class="card">
        <div class="hd-head">
          <span class="hd-ico">${h.icon||'🎯'}</span>
          <div><div class="hd-nm">${U.esc(h.name)}</div><div class="hd-desc">${U.esc(h.desc||freqLabel(h))}</div></div>
          <div class="hd-actions"><button data-act="edit">编辑</button><button data-act="archive">归档</button></div>
        </div>
        <div class="hd-stats">
          <div class="stat-box"><div class="big">${currentStreak(h)}<span class="u">天</span></div><div class="lbl">当前连续 🔥</div></div>
          <div class="stat-box"><div class="big">${longestStreak(h)}<span class="u">天</span></div><div class="lbl">最长连续</div></div>
          <div class="stat-box"><div class="big">${weekDoneCount(h,weekStart)}<span class="u">/${weekTarget(h)}</span></div><div class="lbl">本周进度</div></div>
        </div>
      </div>`;
    host.querySelector('[data-act=edit]').addEventListener('click',()=>openHabitForm(h.id));
    host.querySelector('[data-act=archive]').addEventListener('click',()=>{ h.archived=true; saveConfig(); selectedHabit=null; render(); toast('已归档'); });
    if(scroll) host.scrollIntoView({behavior:'smooth',block:'nearest'});
  }

  /* ---------- 归档列表 ---------- */
  function renderArchived(){
    const host=document.getElementById('hArchived');
    const arch=archivedHabits();
    if(!arch.length){ host.innerHTML=''; return; }
    host.innerHTML=`<div class="hint" style="margin-bottom:8px;">已归档（${arch.length}）</div>`+
      arch.map(h=>`<div class="arch-item"><span class="a-ico">${h.icon||'🎯'}</span><span>${U.esc(h.name)}</span>
        <button data-restore="${h.id}">恢复</button><button data-del="${h.id}">删除</button></div>`).join('');
    host.querySelectorAll('[data-restore]').forEach(b=>b.addEventListener('click',()=>{ const h=config.find(x=>x.id===Number(b.dataset.restore)); h.archived=false; saveConfig(); render(); toast('已恢复'); }));
    host.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>{ deleteHabit(Number(b.dataset.del)); }));
  }

  function deleteHabit(id){
    config=config.filter(h=>h.id!==id);
    Object.keys(log).forEach(d=>{ if(log[d][id]){ delete log[d][id]; if(!Object.keys(log[d]).length) delete log[d]; } });
    saveConfig(); saveLog(); if(selectedHabit===id) selectedHabit=null; render(); toast('已删除习惯');
  }

  /* ---------- 年度热力图（按当日完成百分比固定分级） ---------- */
  function renderHeat(){
    const host=document.getElementById('hHeat');
    const habits=activeHabits();
    if(!habits.length){ host.innerHTML='<div class="hint">暂无数据</div>'; return; }
    const end=new Date(); end.setHours(0,0,0,0);
    const start=mondayOf(addDays(end,-364));
    let html='<div class="heatmap">';
    let cur=new Date(start);
    while(cur<=end){
      const iso=U.toISO(cur);
      const done=habits.reduce((s,h)=>s+(isDone(h.id,iso)?1:0),0);
      const pct= habits.length? done/habits.length : 0;
      let lv=0; if(pct>0){ if(pct>=1)lv=4; else if(pct>=.66)lv=3; else if(pct>=.33)lv=2; else lv=1; }
      html+=`<div class="heat-cell ${lv?'l'+lv:''}" title="${iso}：${done}/${habits.length}"></div>`;
      cur=addDays(cur,1);
    }
    html+='</div>';
    host.innerHTML=`<div class="heat-wrap">${html}</div>
      <div class="heat-legend"><span>低</span><span class="hl-c heat-cell"></span><span class="hl-c heat-cell l1"></span><span class="hl-c heat-cell l2"></span><span class="hl-c heat-cell l3"></span><span class="hl-c heat-cell l4"></span><span>全部完成</span></div>`;
  }

  /* ---------- 添加 / 编辑 弹窗 ---------- */
  let sheet, formIcon='🎯', formFreq='daily';
  function buildSheet(){
    sheet=document.createElement('div'); sheet.className='sheet';
    sheet.innerHTML=`<div class="sheet-grip"></div>
      <div class="sheet-head"><h3 id="hfTitle">添加习惯</h3><button class="sheet-close" data-close>×</button></div>
      <div class="sheet-body"><form id="hForm" autocomplete="off"><input type="hidden" id="hEditId">
        <div class="field"><label>图标</label><div class="emoji-row" id="hEmoji"></div></div>
        <div class="field"><label>名称</label><input type="text" id="hfName" placeholder="例如 早起、喝水2000ml" required></div>
        <div class="field"><label>简短描述（可选）</label><input type="text" id="hfDesc" placeholder="例如 6:30 起床"></div>
        <div class="field"><label>目标频率</label>
          <div class="seg" id="hFreq"><button type="button" data-f="daily" class="on">每天</button><button type="button" data-f="weekly">每周X次</button><button type="button" data-f="custom">自定义</button></div>
          <div class="freq-extra hidden" id="hFreqWeekly"><span>每周</span><input type="number" id="hfTimes" min="1" max="7" value="3"><span>次</span></div>
          <div class="freq-extra hidden" id="hFreqCustom"><span>每隔</span><input type="number" id="hfInterval" min="1" value="2"><span>天一次</span></div>
        </div>
        <div class="form-actions"><button type="button" class="btn btn-danger hidden" id="hDel">删除</button><button type="submit" class="btn btn-primary" id="hSave">保存</button></div>
      </form></div>`;
    document.body.appendChild(sheet);
    // emoji 选择
    const er=sheet.querySelector('#hEmoji');
    er.innerHTML=EMOJIS.map(e=>`<div class="em" data-e="${e}">${e}</div>`).join('');
    er.addEventListener('click',ev=>{ const el=ev.target.closest('.em'); if(!el)return; formIcon=el.dataset.e; er.querySelectorAll('.em').forEach(x=>x.classList.toggle('on',x===el)); });
    // 频率切换
    sheet.querySelectorAll('#hFreq button').forEach(b=>b.addEventListener('click',()=>setFreq(b.dataset.f)));
    sheet.querySelector('[data-close]').addEventListener('click',()=>closeSheet(sheet));
    // 删除（两步）
    let armed=false,t;
    sheet.querySelector('#hDel').addEventListener('click',e=>{
      const id=Number(document.getElementById('hEditId').value); if(!id)return; const btn=e.target;
      if(!armed){ armed=true; btn.classList.add('armed'); btn.textContent='确认删除？含打卡记录'; clearTimeout(t); t=setTimeout(()=>{armed=false;btn.classList.remove('armed');btn.textContent='删除';},3000); return; }
      armed=false; closeSheet(sheet); deleteHabit(id);
    });
    // 提交
    sheet.querySelector('#hForm').addEventListener('submit',e=>{
      e.preventDefault();
      const name=document.getElementById('hfName').value.trim();
      if(!name){ toast('请填写名称'); return; }
      let freq;
      if(formFreq==='weekly') freq={type:'weekly',times:Math.min(7,Math.max(1,parseInt(document.getElementById('hfTimes').value)||1))};
      else if(formFreq==='custom') freq={type:'custom',interval:Math.max(1,parseInt(document.getElementById('hfInterval').value)||1)};
      else freq={type:'daily'};
      const desc=document.getElementById('hfDesc').value.trim();
      const id=document.getElementById('hEditId').value;
      if(id){ const h=config.find(x=>x.id===Number(id)); Object.assign(h,{name,desc,icon:formIcon,freq}); }
      else config.push({id:U.uid(),name,desc,icon:formIcon,freq,archived:false});
      saveConfig(); closeSheet(sheet); render(); toast(id?'已保存':'习惯已添加');
    });
  }
  function setFreq(f){ formFreq=f; sheet.querySelectorAll('#hFreq button').forEach(b=>b.classList.toggle('on',b.dataset.f===f));
    sheet.querySelector('#hFreqWeekly').classList.toggle('hidden',f!=='weekly');
    sheet.querySelector('#hFreqCustom').classList.toggle('hidden',f!=='custom'); }
  function openHabitForm(id){
    sheet.querySelector('#hForm').reset();
    const del=document.getElementById('hDel'); del.textContent='删除'; del.classList.remove('armed');
    if(id){ const h=config.find(x=>x.id===id);
      document.getElementById('hfTitle').textContent='编辑习惯'; document.getElementById('hEditId').value=h.id;
      document.getElementById('hfName').value=h.name; document.getElementById('hfDesc').value=h.desc||'';
      formIcon=h.icon||'🎯'; setFreq(h.freq.type);
      if(h.freq.type==='weekly') document.getElementById('hfTimes').value=h.freq.times;
      if(h.freq.type==='custom') document.getElementById('hfInterval').value=h.freq.interval;
      del.classList.remove('hidden');
    } else {
      document.getElementById('hfTitle').textContent='添加习惯'; document.getElementById('hEditId').value='';
      formIcon='🎯'; setFreq('daily'); del.classList.add('hidden');
    }
    sheet.querySelectorAll('#hEmoji .em').forEach(x=>x.classList.toggle('on',x.dataset.e===formIcon));
    openSheet(sheet);
  }

  /* ---------- 暴露给仪表盘：今日完成情况 ---------- */
  window.getTodayHabitCompletion=function(){
    const cfg=Storage.get('habits_config',[]);
    const lg=Storage.get('habits_log',{});
    const active=cfg.filter(h=>!h.archived);
    const today=U.today();
    const done=active.reduce((s,h)=>s+((lg[today]&&lg[today][h.id])?1:0),0);
    return { done, total:active.length };
  };

  /* ---------- 暴露给目标模块：界面刷新钩子（被 updateHabitLog 调用后重绘） ---------- */
  window.__refreshHabits=function(){ try{ if(bound){ loadData(); render(); } }catch(e){} };
})();
</script>


<!-- =========================================================================
     跨模块接口约定（供目标模块调用，全部 try-catch，默认返回 0/空）
     - getBooksReadThisYear()  阅读：今年读完的书本数
     - getExercisePR(name)     力量：某动作的历史最大重量(kg)
     - getExerciseNames()      力量：动作库名称列表（供表单选择）
     - getLatestWeight()       身体：最新体重(kg)
     - getHabitStreak(id)      习惯：某习惯当前连续天数
     - getHabitsList()         习惯：进行中习惯列表（供表单选择/关联）
     - updateHabitLog(date,id,value)  反向更新习惯打卡并刷新习惯界面
========================================================================= -->
<script>
(function(){
  function iso(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

  window.getBooksReadThisYear=function(){
    try{
      const d=Storage.get('reading_data',{records:[],books:[]});
      const year=String(new Date().getFullYear());
      const booksThisYear=new Set(d.records.filter(r=>r.date.indexOf(year+'-')===0).map(r=>r.bookName));
      let n=0;
      d.books.forEach(b=>{
        if(!booksThisYear.has(b.name)) return;               // 今年有阅读记录
        if(b.medium==='纸质' && b.totalPages>0){              // 纸质书：累计页数达到总页数视为读完
          const pages=d.records.filter(r=>r.bookName===b.name).reduce((s,r)=>s+(Number(r.pagesRead)||0),0);
          if(pages>=b.totalPages) n++;
        }
      });
      return n;
    }catch(e){ return 0; }
  };

  // 按动作的计量方式返回历史最佳：负重类→最大重量(kg)；自重→最多次数；计时→最长秒数；有氧→最远距离(km)
  window.getExercisePR=function(name){
    try{
      const lib=Storage.get('fitness_exercises',[]);
      const def=lib.find(e=>e.name===name);
      const metric=(def&&def.metric)||'weight';
      const ws=Storage.get('fitness_workouts',[]);
      let max=0;
      ws.forEach(w=>w.exercises.forEach(e=>{
        if(e.name!==name) return;
        const m=e.metric||metric;
        e.sets.forEach(s=>{
          let v=0;
          if(m==='weight'||m==='weighted') v=+s.weight||0;
          else if(m==='bodyweight') v=+s.reps||0;
          else if(m==='time') v=+s.seconds||0;
          else if(m==='cardio') v=+s.distance||0;
          if(v>max) max=v;
        });
      }));
      return max;
    }catch(e){ return 0; }
  };
  // 某动作 PR 的单位（供目标模块显示）
  window.getExercisePRUnit=function(name){
    try{
      const def=Storage.get('fitness_exercises',[]).find(e=>e.name===name);
      const m=(def&&def.metric)||'weight';
      return {weight:'kg',weighted:'kg',bodyweight:'次',time:'秒',cardio:'km'}[m]||'kg';
    }catch(e){ return 'kg'; }
  };
  window.getExerciseNames=function(){
    try{ return Storage.get('fitness_exercises',[]).map(e=>e.name); }catch(e){ return []; }
  };

  window.getLatestWeight=function(){
    try{ const ws=Storage.get('body_weights',[]).slice().sort((a,b)=>a.date<b.date?-1:1); return ws.length? ws[ws.length-1].kg : 0; }catch(e){ return 0; }
  };

  window.getHabitStreak=function(habitId){
    try{
      const lg=Storage.get('habits_log',{});
      const done=s=>!!(lg[s]&&lg[s][habitId]);
      let n=0, cur=new Date(); cur.setHours(0,0,0,0);
      if(!done(iso(cur))){ cur.setDate(cur.getDate()-1); if(!done(iso(cur))) return 0; }
      while(done(iso(cur))){ n++; cur.setDate(cur.getDate()-1); }
      return n;
    }catch(e){ return 0; }
  };
  window.getHabitsList=function(){
    try{ return Storage.get('habits_config',[]).filter(h=>!h.archived).map(h=>({id:h.id,name:h.name,icon:h.icon})); }catch(e){ return []; }
  };

  // 反向更新习惯打卡：目标打卡 → 习惯对应日期同步
  window.updateHabitLog=function(date, habitId, value){
    try{
      const lg=Storage.get('habits_log',{});
      if(!lg[date]) lg[date]={};
      if(value){ lg[date][habitId]=true; }
      else { delete lg[date][habitId]; if(!Object.keys(lg[date]).length) delete lg[date]; }
      Storage.set('habits_log',lg);
      if(typeof window.__refreshHabits==='function') window.__refreshHabits();
      return true;
    }catch(e){ return false; }
  };
})();
</script>


<!-- =========================================================================
     js/modules/goals.js  —— 目标与进度（自动追踪 / 手动数值 / 打卡挑战）
     导出 initGoals()；并暴露 window.getGoalsSummary()
========================================================================= -->
<script>
(function(){
  let goals, log, history, bound=false;

  function load(){
    goals=Storage.get('goals_config',[]);
    log=Storage.get('goals_checkin_log',{});       // { goalId: { iso:true } } 仅非关联打卡目标
    history=Storage.get('goals_history',{});        // { goalId: [{t,v}] }
  }
  function saveGoals(){ Storage.set('goals_config',goals); }
  function saveLog(){ Storage.set('goals_checkin_log',log); }
  function saveHistory(){ Storage.set('goals_history',history); }

  // —— 安全调用跨模块接口 ——
  function call(fn,def,...args){ try{ return (typeof window[fn]==='function') ? window[fn](...args) : def; }catch(e){ return def; } }

  // —— 日期工具 ——
  function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
  function daysBetween(a,b){ return Math.round((U.parseISO(b)-U.parseISO(a))/86400000); }
  function mondayOf(d){ const x=new Date(d); x.setHours(0,0,0,0); const o=(x.getDay()+6)%7; x.setDate(x.getDate()-o); return x; }

  /* ================= 打卡读写（关联习惯 / 自身 log） ================= */
  function checkinDates(g){
    if(g.linkedHabitId){
      const lg=Storage.get('habits_log',{});
      return Object.keys(lg).filter(d=>lg[d][g.linkedHabitId]===true);
    }
    return Object.keys(log[g.id]||{});
  }
  function isChecked(g,iso){
    if(g.linkedHabitId){ const lg=Storage.get('habits_log',{}); return !!(lg[iso]&&lg[iso][g.linkedHabitId]); }
    return !!(log[g.id]&&log[g.id][iso]);
  }
  function toggleCheckin(g,iso){
    if(iso>U.today()) { toast('不能给未来日期打卡'); return; }
    const cur=isChecked(g,iso);
    if(g.linkedHabitId){
      const okFn=(typeof window.updateHabitLog==='function');
      if(okFn){ window.updateHabitLog(iso, g.linkedHabitId, !cur); }
      else {  // 习惯模块不可用 → 退回自身存储
        if(!log[g.id]) log[g.id]={};
        if(cur) delete log[g.id][iso]; else log[g.id][iso]=true; saveLog();
      }
    } else {
      if(!log[g.id]) log[g.id]={};
      if(cur) delete log[g.id][iso]; else log[g.id][iso]=true; saveLog();
    }
    recordHistory(g);
    render();
  }
  // 连续天数（截止今日，含“今日未打但昨日已打”仍存活）
  function checkinStreak(g){
    const set=new Set(checkinDates(g));
    if(!set.size) return 0;
    let n=0, cur=new Date(); cur.setHours(0,0,0,0);
    if(!set.has(U.toISO(cur))){ cur=addDays(cur,-1); if(!set.has(U.toISO(cur))) return 0; }
    const start=g.startDate||null;
    while(set.has(U.toISO(cur))){ if(start && U.toISO(cur)<start) break; n++; cur=addDays(cur,-1); }
    return n;
  }
  function checkinCumulative(g){
    let ds=checkinDates(g);
    if(g.startDate) ds=ds.filter(d=>d>=g.startDate);
    if(g.deadline) ds=ds.filter(d=>d<=g.deadline);
    return ds.length;
  }

  /* ================= 进度计算 ================= */
  function progress(g){
    let cur=0, tgt=g.targetValue||0, unit='', pct=0, done=false, decreasing=false;
    if(g.type==='auto'){
      if(g.dataSource==='reading'){ cur=call('getBooksReadThisYear',0); unit='本'; }
      else if(g.dataSource==='fitnessPR'){ cur=call('getExercisePR',0,g.exerciseName); unit=call('getExercisePRUnit','kg',g.exerciseName); }
      else if(g.dataSource==='weight'){ cur=call('getLatestWeight',0); unit='kg'; decreasing=true; }
      else if(g.dataSource==='habitStreak'){ cur=call('getHabitStreak',0,g.habitId); unit='天'; }
    } else if(g.type==='manual'){ cur=g.currentValue||0; unit=g.unit||''; decreasing=!!g.decreasing; }
    else if(g.type==='checkin'){ unit='天'; cur=(g.checkinType==='streak')?checkinStreak(g):checkinCumulative(g); }

    if(decreasing){
      const start=(g.startValue!=null)?g.startValue:cur;
      pct=(start<=tgt)?1:(start-cur)/(start-tgt);
      done=cur<=tgt && cur>0;
    } else {
      pct=tgt>0?cur/tgt:0; done=cur>=tgt && tgt>0;
    }
    pct=Math.max(0,Math.min(1,pct));
    return {cur,tgt,unit,pct,done,decreasing};
  }

  function ringColor(pct,done){
    if(done) return '#2F6FB6';            // 完成-蓝
    if(pct>0.7) return '#4E9A6B';          // 绿
    if(pct>=0.3) return '#D98A2B';         // 橙
    return '#C0563A';                      // 红
  }
  function typeLabel(g){
    if(g.type==='auto') return {auto:'自动'}.auto;
    if(g.type==='manual') return '手动';
    return g.checkinType==='streak'?'连续打卡':'累计打卡';
  }
  function typeClass(g){ return g.type; }

  // 历史记录（值变化时追加）
  function recordHistory(g){
    const p=progress(g); const arr=history[g.id]||(history[g.id]=[]);
    const last=arr[arr.length-1];
    if(!last || last.v!==p.cur){ arr.push({t:Date.now(), v:p.cur}); if(arr.length>200) arr.shift(); saveHistory(); }
  }
  // 预计完成日（简单线性）
  function predictDate(g){
    const p=progress(g); if(p.done) return null;
    const arr=history[g.id]||[];
    if(g.type==='checkin'){
      const elapsed=Math.max(1, daysBetween(g.startDate||U.today(), U.today())+1);
      const rate=p.cur/elapsed; if(rate<=0) return null;
      const remain=p.tgt-p.cur; const need=Math.ceil(remain/rate);
      return U.toISO(addDays(new Date(),need));
    }
    if(arr.length>=2){
      const first=arr[0], last=arr[arr.length-1];
      const dt=Math.max(1,(last.t-first.t)/86400000);
      const rate=(last.v-first.v)/dt; if(Math.abs(rate)<1e-6) return null;
      const remain=p.tgt-p.cur; const need=remain/rate;
      if(need<=0) return null;
      return U.toISO(addDays(new Date(),Math.ceil(need)));
    }
    return null;
  }

  /* ================= 初始化 ================= */
  window.initGoals=function(){
    load();
    const root=document.getElementById('module-goals');
    if(!bound){
      root.innerHTML=`
        <div class="page-head-row"><div><div class="page-title">目标</div><div class="page-sub" id="goSub"></div></div></div>
        <div class="goals-grid" id="goGrid"></div>
        <button class="fab" id="goAdd" aria-label="添加目标">＋</button>`;
      root.querySelector('#goAdd').addEventListener('click',()=>openForm());
      buildFormSheet(); buildDetailSheet();
      bound=true;
    }
    // 进入时刷新自动型目标的历史点
    goals.forEach(g=>{ if(g.type==='auto') recordHistory(g); });
    render();
  };

  function render(){
    document.getElementById('goSub').textContent=`共 ${goals.length} 个目标`;
    const grid=document.getElementById('goGrid');
    if(!goals.length){
      grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1;"><div class="em-ill">标</div><p>还没有目标<br>点右下角 ＋ 创建第一个目标</p></div>`;
      return;
    }
    grid.innerHTML=goals.map(g=>cardHTML(g)).join('');
    // 绑定
    grid.querySelectorAll('.goal-card').forEach(c=>{
      const id=Number(c.dataset.id);
      c.addEventListener('click',e=>{
        if(e.target.closest('[data-stop]')) return;   // 按钮/格子不触发详情
        openDetail(id);
      });
    });
    grid.querySelectorAll('[data-checktoday]').forEach(b=>b.addEventListener('click',()=>{ const g=goals.find(x=>x.id===Number(b.dataset.checktoday)); toggleCheckin(g,U.today()); }));
    grid.querySelectorAll('[data-wm]').forEach(cell=>cell.addEventListener('click',()=>{ if(cell.classList.contains('future'))return; const g=goals.find(x=>x.id===Number(cell.dataset.g)); toggleCheckin(g,cell.dataset.d); }));
    grid.querySelectorAll('[data-update]').forEach(b=>b.addEventListener('click',()=>openUpdate(Number(b.dataset.update))));
  }

  /* ================= 卡片 ================= */
  function cardHTML(g){
    const p=progress(g);
    const remain = g.deadline ? daysBetween(U.today(),g.deadline) : null;
    const pred = predictDate(g);
    let foot=`<span>${g.deadline?(remain>=0?`剩 ${remain} 天`:'已过期'):'无截止'}</span>`;
    if(p.done) foot+=`<span class="done-badge">✓ 已完成</span>`;
    else if(pred) foot+=`<span>预计 ${pred.slice(5)} 完成</span>`;

    let body;
    if(g.type==='checkin'){
      body=checkinCardBody(g,p);
    } else {
      const c=ringColor(p.pct,p.done);
      const C=2*Math.PI*34, off=C*(1-p.pct);
      const upd = g.type==='manual' ? `<button class="btn btn-ghost" data-stop data-update="${g.id}">更新进度</button>` : '';
      body=`<div class="ring-wrap">
        <div class="ring"><svg width="96" height="96"><circle cx="48" cy="48" r="34" fill="none" stroke="var(--surface-2)" stroke-width="9"/><circle cx="48" cy="48" r="34" fill="none" stroke="${c}" stroke-width="9" stroke-linecap="round" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/></svg>
          <div class="ring-txt"><span class="ring-pct" style="color:${c}">${Math.round(p.pct*100)}%</span></div></div>
        <div class="ring-info"><div class="ri-cur">${fmtNum(p.cur)}<span class="u">${p.unit}</span></div>
          <div class="ri-tgt">目标 ${g.decreasing?'≤ ':''}${fmtNum(p.tgt)} ${p.unit}</div>${upd}</div>
      </div>`;
    }
    return `<div class="goal-card" data-id="${g.id}">
      <div class="gc-top"><div class="gc-title">${U.esc(g.title)}</div><span class="gc-type ${typeClass(g)}">${typeLabel(g)}</span></div>
      ${body}
      <div class="gc-foot">${foot}${g.linkedHabitId?'<span class="linked-tag">已关联习惯</span>':''}</div>
    </div>`;
  }
  function fmtNum(n){ return (Math.round(n*10)/10).toString(); }

  function checkinCardBody(g,p){
    const today=U.today();
    const checkedToday=isChecked(g,today);
    // 点阵（最多 60 个）
    const showN=Math.min(g.targetValue||30,60);
    let dots=''; for(let i=0;i<showN;i++) dots+=`<span class="dc ${i<p.cur?'on':''}"></span>`;
    if((g.targetValue||0)>60) dots+=`<span class="dc more">+${g.targetValue-60}</span>`;
    // 本周 7 列
    const ws=mondayOf(new Date());
    const WD=['一','二','三','四','五','六','日'];
    let wk=''; for(let i=0;i<7;i++){ const d=U.toISO(addDays(ws,i)); const on=isChecked(g,d); const fut=d>today;
      wk+=`<div class="wm"><div class="wm-w">${WD[i]}</div><div class="wm-c ${on?'on':''} ${d===today?'today':''} ${fut?'future':''}" data-stop data-wm data-g="${g.id}" data-d="${d}">${on?'✓':''}</div></div>`; }
    return `<div class="checkin-body">
      <div class="ck-stat"><span class="ck-num">${p.cur}<span class="u">天</span></span><span class="ck-of">/ ${g.targetValue} 天目标（${g.checkinType==='streak'?'连续':'累计'}）</span></div>
      <div class="dot-chain">${dots}</div>
      <div class="wk-mini">${wk}</div>
      <button class="checkin-today-btn ${checkedToday?'checked':''}" data-stop data-checktoday="${g.id}">${checkedToday?'✓ 今日已打卡':'今日打卡'}</button>
    </div>`;
  }

  /* ================= 创建 / 编辑 表单 ================= */
  let sheet, fType='auto', fSource='reading';
  function buildFormSheet(){
    sheet=document.createElement('div'); sheet.className='sheet';
    sheet.innerHTML=`<div class="sheet-grip"></div>
      <div class="sheet-head"><h3 id="gfTitle">新建目标</h3><button class="sheet-close" data-close>×</button></div>
      <div class="sheet-body"><form id="gForm" autocomplete="off"><input type="hidden" id="gEditId">
        <div class="field"><label>目标类型</label>
          <div class="seg" id="gType"><button type="button" data-t="auto" class="on">自动追踪</button><button type="button" data-t="manual">手动数值</button><button type="button" data-t="checkin">打卡挑战</button></div>
        </div>

        <!-- 自动型：数据源 -->
        <div id="gAutoBox">
          <div class="field"><label>数据来源</label>
            <select id="gfSource"><option value="reading">阅读 · 今年读完 X 本书</option><option value="fitnessPR">力量 · 某动作达到 Y kg</option><option value="weight">体重 · 降到 Z kg</option><option value="habitStreak">习惯 · 连续 N 天</option></select>
          </div>
          <div class="field hidden" id="gfExBox"><label>选择动作</label><select id="gfExercise"></select></div>
          <div class="field hidden" id="gfHabitBox"><label>选择习惯</label><select id="gfHabit"></select></div>
        </div>

        <div class="field"><label>目标名称</label><input type="text" id="gfName" placeholder="例如 今年读完12本书" required></div>

        <!-- 手动型额外 -->
        <div id="gManualBox" class="hidden">
          <div class="row-2"><div class="field"><label>单位</label><input type="text" id="gfUnit" placeholder="如 元 / 公里"></div>
          <div class="field"><label>当前值</label><input type="number" id="gfCurrent" step="any" value="0"></div></div>
        </div>

        <!-- 数值目标（auto 非习惯/手动 共用） -->
        <div class="field" id="gfTargetBox"><label id="gfTargetLbl">目标值</label><input type="number" id="gfTarget" step="any" placeholder="数字"></div>

        <!-- 打卡型额外 -->
        <div id="gCheckinBox" class="hidden">
          <div class="field"><label>打卡方式</label><div class="seg" id="gCkType"><button type="button" data-c="streak" class="on">连续天数</button><button type="button" data-c="cumulative">累计次数</button></div></div>
          <div class="row-2"><div class="field"><label>目标天数</label><input type="number" id="gfDays" min="1" value="30"></div>
          <div class="field"><label>起始日期</label><input type="date" id="gfStart"></div></div>
          <div class="field"><label>关联习惯（可选，双向同步打卡）</label><select id="gfLinkHabit"><option value="">不关联（独立打卡）</option></select></div>
        </div>

        <div class="field"><label>截止日期（可选）</label><input type="date" id="gfDeadline"></div>

        <div class="form-actions"><button type="button" class="btn btn-danger hidden" id="gDel">删除</button><button type="submit" class="btn btn-primary" id="gSave">保存目标</button></div>
      </form></div>`;
    document.body.appendChild(sheet);
    sheet.querySelector('[data-close]').addEventListener('click',()=>closeSheet(sheet));
    sheet.querySelectorAll('#gType button').forEach(b=>b.addEventListener('click',()=>setType(b.dataset.t)));
    sheet.querySelectorAll('#gCkType button').forEach(b=>b.addEventListener('click',()=>{ sheet.querySelectorAll('#gCkType button').forEach(x=>x.classList.toggle('on',x===b)); }));
    document.getElementById('gfSource').addEventListener('change',()=>setSource(document.getElementById('gfSource').value));
    document.getElementById('gfExercise').addEventListener('change',()=>{ if(fSource==='fitnessPR') setSource('fitnessPR'); });
    // 删除（两步）
    let armed=false,t;
    document.getElementById('gDel').addEventListener('click',e=>{
      const id=Number(document.getElementById('gEditId').value); if(!id)return; const btn=e.target;
      if(!armed){ armed=true; btn.classList.add('armed'); btn.textContent='确认删除？'; clearTimeout(t); t=setTimeout(()=>{armed=false;btn.classList.remove('armed');btn.textContent='删除';},3000); return; }
      goals=goals.filter(x=>x.id!==id); delete log[id]; delete history[id];
      saveGoals(); saveLog(); saveHistory(); armed=false; closeSheet(sheet); render(); toast('已删除目标');
    });
    document.getElementById('gForm').addEventListener('submit',onSubmit);
  }

  function setType(t){
    fType=t;
    sheet.querySelectorAll('#gType button').forEach(b=>b.classList.toggle('on',b.dataset.t===t));
    document.getElementById('gAutoBox').classList.toggle('hidden',t!=='auto');
    document.getElementById('gManualBox').classList.toggle('hidden',t!=='manual');
    document.getElementById('gCheckinBox').classList.toggle('hidden',t!=='checkin');
    // 数值目标框：打卡型隐藏（用目标天数）；自动-习惯也用“天”，仍显示目标值=天数
    document.getElementById('gfTargetBox').classList.toggle('hidden', t==='checkin');
    if(t==='auto') setSource(document.getElementById('gfSource').value);
  }
  function setSource(s){
    fSource=s;
    document.getElementById('gfExBox').classList.toggle('hidden',s!=='fitnessPR');
    document.getElementById('gfHabitBox').classList.toggle('hidden',s!=='habitStreak');
    let lbl={reading:'目标本数',fitnessPR:'目标重量(kg)',weight:'目标体重(kg)',habitStreak:'目标连续天数'}[s];
    if(s==='fitnessPR'){
      const ex=document.getElementById('gfExercise').value;
      const u=call('getExercisePRUnit','kg',ex);
      lbl=`目标${{kg:'重量(kg)','次':'次数(次)','秒':'时长(秒)',km:'距离(km)'}[u]||'重量(kg)'}`;
    }
    document.getElementById('gfTargetLbl').textContent=lbl;
  }
  function fillSelectors(){
    // 动作
    const exSel=document.getElementById('gfExercise');
    const exs=call('getExerciseNames',[]);
    exSel.innerHTML=exs.length?exs.map(n=>`<option>${U.esc(n)}</option>`).join(''):'<option value="">（健身动作库为空）</option>';
    // 习惯
    const habits=call('getHabitsList',[]);
    const opt=habits.map(h=>`<option value="${h.id}">${U.esc(h.icon||'')} ${U.esc(h.name)}</option>`).join('');
    document.getElementById('gfHabit').innerHTML=habits.length?opt:'<option value="">（暂无习惯，请先在习惯模块添加）</option>';
    document.getElementById('gfLinkHabit').innerHTML='<option value="">不关联（独立打卡）</option>'+opt;
  }

  function openForm(){
    document.getElementById('gForm').reset();
    fillSelectors();
    document.getElementById('gEditId').value='';
    document.getElementById('gfTitle').textContent='新建目标';
    document.getElementById('gDel').classList.add('hidden');
    document.getElementById('gfStart').value=U.today();
    setType('auto'); setSource('reading');
    openSheet(sheet);
  }
  function openEdit(id){
    const g=goals.find(x=>x.id===id); if(!g)return;
    document.getElementById('gForm').reset(); fillSelectors();
    document.getElementById('gEditId').value=g.id;
    document.getElementById('gfTitle').textContent='编辑目标';
    document.getElementById('gDel').classList.remove('hidden');
    document.getElementById('gfName').value=g.title;
    document.getElementById('gfDeadline').value=g.deadline||'';
    setType(g.type);
    if(g.type==='auto'){ document.getElementById('gfSource').value=g.dataSource; setSource(g.dataSource);
      if(g.dataSource==='fitnessPR') document.getElementById('gfExercise').value=g.exerciseName||'';
      if(g.dataSource==='habitStreak') document.getElementById('gfHabit').value=g.habitId||'';
      document.getElementById('gfTarget').value=g.targetValue;
    } else if(g.type==='manual'){ document.getElementById('gfUnit').value=g.unit||''; document.getElementById('gfCurrent').value=g.currentValue||0; document.getElementById('gfTarget').value=g.targetValue; }
    else { sheet.querySelectorAll('#gCkType button').forEach(x=>x.classList.toggle('on',x.dataset.c===g.checkinType));
      document.getElementById('gfDays').value=g.targetValue; document.getElementById('gfStart').value=g.startDate||U.today();
      document.getElementById('gfLinkHabit').value=g.linkedHabitId||''; }
    openSheet(sheet);
  }

  function onSubmit(e){
    e.preventDefault();
    const title=document.getElementById('gfName').value.trim();
    if(!title){ toast('请填写目标名称'); return; }
    const deadline=document.getElementById('gfDeadline').value||null;
    const id=document.getElementById('gEditId').value;
    let g = id ? goals.find(x=>x.id===Number(id)) : {id:U.uid()};
    g.title=title; g.deadline=deadline; g.type=fType;

    if(fType==='auto'){
      g.dataSource=fSource; g.type='auto';
      g.targetValue=parseFloat(document.getElementById('gfTarget').value)||0;
      if(fSource==='fitnessPR') g.exerciseName=document.getElementById('gfExercise').value;
      if(fSource==='habitStreak') g.habitId=Number(document.getElementById('gfHabit').value)||null;
      if(fSource==='weight'){ g.decreasing=true; g.startValue=call('getLatestWeight',0)||g.targetValue; }
      delete g.linkedHabitId; delete g.checkinType; delete g.startDate; delete g.currentValue; delete g.unit;
    } else if(fType==='manual'){
      g.dataSource='custom'; g.unit=document.getElementById('gfUnit').value.trim();
      g.currentValue=parseFloat(document.getElementById('gfCurrent').value)||0;
      g.targetValue=parseFloat(document.getElementById('gfTarget').value)||0;
      delete g.linkedHabitId; delete g.checkinType; delete g.startDate; delete g.exerciseName; delete g.habitId;
    } else {
      g.checkinType=sheet.querySelector('#gCkType button.on').dataset.c;
      g.targetValue=Math.max(1,parseInt(document.getElementById('gfDays').value)||1);
      g.startDate=document.getElementById('gfStart').value||U.today();
      g.linkedHabitId=Number(document.getElementById('gfLinkHabit').value)||null;
      delete g.dataSource; delete g.currentValue; delete g.unit; delete g.exerciseName; delete g.habitId; delete g.decreasing;
    }
    if(!id){ g.createdAt=Date.now(); goals.push(g); }
    saveGoals(); recordHistory(g); closeSheet(sheet); render(); toast(id?'已保存':'目标已创建');
  }

  // 手动更新进度
  let updSheet;
  function openUpdate(id){
    const g=goals.find(x=>x.id===id); if(!g)return;
    if(!updSheet){ updSheet=document.createElement('div'); updSheet.className='sheet'; document.body.appendChild(updSheet); }
    updSheet.innerHTML=`<div class="sheet-grip"></div>
      <div class="sheet-head"><h3>更新进度</h3><button class="sheet-close" data-close>×</button></div>
      <div class="sheet-body"><form id="gUForm"><div class="field"><label>${U.esc(g.title)} · 当前值${g.unit?'（'+U.esc(g.unit)+'）':''}</label>
        <input type="number" id="gUVal" step="any" value="${g.currentValue||0}"></div>
        <div class="form-actions"><button type="submit" class="btn btn-primary btn-block">保存</button></div></form></div>`;
    updSheet.querySelector('[data-close]').addEventListener('click',()=>closeSheet(updSheet));
    updSheet.querySelector('#gUForm').addEventListener('submit',ev=>{ ev.preventDefault();
      g.currentValue=parseFloat(document.getElementById('gUVal').value)||0; saveGoals(); recordHistory(g); closeSheet(updSheet); render(); toast('进度已更新'); });
    openSheet(updSheet);
  }

  /* ================= 详情（月历 + 趋势） ================= */
  let detail, detailMonth;
  function buildDetailSheet(){ detail=document.createElement('div'); detail.className='sheet'; document.body.appendChild(detail); }
  function openDetail(id){
    const g=goals.find(x=>x.id===id); if(!g)return;
    detailMonth=new Date(); detailMonth.setDate(1);
    renderDetail(g);
    openSheet(detail);
  }
  function renderDetail(g){
    const p=progress(g);
    let inner=`<div class="sheet-grip"></div>
      <div class="sheet-head"><h3>${U.esc(g.title)}</h3><button class="sheet-close" data-close>×</button></div>
      <div class="sheet-body">
        <div class="stat-row"><div class="stat-box"><div class="big">${Math.round(p.pct*100)}<span class="u">%</span></div><div class="lbl">完成度</div></div>
          <div class="stat-box"><div class="big">${fmtNum(p.cur)}<span class="u">${p.unit}</span></div><div class="lbl">当前</div></div>
          <div class="stat-box"><div class="big">${fmtNum(p.tgt)}<span class="u">${p.unit}</span></div><div class="lbl">目标</div></div></div>
        <div class="hd-actions" style="margin-top:14px;display:flex;gap:8px;"><button class="btn btn-ghost" id="gdEdit" style="flex:1;">编辑目标</button>${g.type==='manual'?'<button class="btn btn-ghost" id="gdUpd" style="flex:1;">更新进度</button>':''}</div>`;

    if(g.type==='checkin'){
      inner+=`<div class="gd-section"><h4>打卡日历</h4>
        <div class="mini-cal-head"><button class="nav-btn" id="gdPrev">‹</button><span class="mc-t" id="gdMonth"></span><button class="nav-btn" id="gdNext">›</button></div>
        <div class="mini-cal" id="gdCal"></div></div>`;
    } else {
      inner+=`<div class="gd-section"><h4>进度趋势</h4><div class="trend-box"><canvas id="gdTrend"></canvas></div></div>`;
    }
    inner+=`</div>`;
    detail.innerHTML=inner;
    detail.querySelector('[data-close]').addEventListener('click',()=>closeSheet(detail));
    detail.querySelector('#gdEdit').addEventListener('click',()=>{ closeSheet(detail); openEdit(g.id); });
    const upd=detail.querySelector('#gdUpd'); if(upd) upd.addEventListener('click',()=>{ closeSheet(detail); openUpdate(g.id); });

    if(g.type==='checkin'){
      const prev=detail.querySelector('#gdPrev'), next=detail.querySelector('#gdNext');
      prev.addEventListener('click',()=>{ detailMonth.setMonth(detailMonth.getMonth()-1); renderMiniCal(g); });
      next.addEventListener('click',()=>{ detailMonth.setMonth(detailMonth.getMonth()+1); renderMiniCal(g); });
      renderMiniCal(g);
    } else {
      drawTrend(g);
    }
  }
  function renderMiniCal(g){
    const y=detailMonth.getFullYear(), m=detailMonth.getMonth();
    detail.querySelector('#gdMonth').textContent=`${y} 年 ${m+1} 月`;
    const first=new Date(y,m,1); const off=(first.getDay()+6)%7; const dim=new Date(y,m+1,0).getDate();
    const today=U.today();
    let html=['一','二','三','四','五','六','日'].map(w=>`<div class="mc-wd">${w}</div>`).join('');
    for(let i=0;i<off;i++) html+=`<div class="mc-d empty"></div>`;
    for(let d=1;d<=dim;d++){ const iso=`${y}-${U.pad(m+1)}-${U.pad(d)}`; const on=isChecked(g,iso);
      html+=`<div class="mc-d ${on?'on':''} ${iso===today?'today':''}">${d}</div>`; }
    detail.querySelector('#gdCal').innerHTML=html;
  }
  function drawTrend(g){
    const cv=detail.querySelector('#gdTrend'); if(!cv)return;
    const arr=(history[g.id]||[]).slice();
    const pts=arr.map(x=>x.v); const labels=arr.map(x=>{ const d=new Date(x.t); return `${d.getMonth()+1}/${d.getDate()}`; });
    if(window.Chart && pts.length){
      new Chart(cv,{type:'line',data:{labels,datasets:[{data:pts,borderColor:'#C2873B',backgroundColor:'rgba(194,135,59,.12)',fill:true,tension:.3,pointRadius:3,borderWidth:2}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'#7C746A',font:{size:10}}},y:{grid:{color:'#EFE8DA'},ticks:{color:'#7C746A',font:{size:10}}}}}});
    } else {
      const ctx=cv.getContext('2d'); const W=cv.clientWidth||cv.parentElement.clientWidth,H=140; cv.width=W;cv.height=H; ctx.clearRect(0,0,W,H);
      ctx.fillStyle='#A8A095'; ctx.font="12px 'Noto Sans SC'"; ctx.textAlign='center';
      ctx.fillText(pts.length?'（图表库未加载）':'暂无趋势数据，更新进度后生成', W/2, H/2);
    }
  }

  /* ================= 暴露给仪表盘 ================= */
  window.getGoalsSummary=function(){
    try{
      load();   // 确保 log/history 已载入（仪表盘可能先于目标模块调用）
      const gs=goals;
      return gs.map(g=>{ const p=progress(g); return { id:g.id, title:g.title, type:g.type, checkinType:g.checkinType,
        percent:Math.round(p.pct*100), current:p.cur, target:p.tgt, unit:p.unit, done:p.done }; });
    }catch(e){ return []; }
  };
})();
</script>

     js/modules/settings.js  —— 设置（数据导出 / 导入 / 清空）
     导出 initSettings()
========================================================================= -->
<script>
(function(){
  let bound=false;
  window.initSettings=function(){
    const root=document.getElementById('module-settings');
    if(!bound){
      root.innerHTML=`
        <div class="page-head-row"><div><div class="page-title">设置</div><div class="page-sub">数据管理与备份</div></div></div>
        <div class="card">
          <div class="set-group"><h4>版本与更新</h4>
            <div class="set-row-item"><div><div class="sri-t">当前版本</div><div class="sri-d" id="sVersion">—</div></div><button class="btn btn-ghost" id="sUpdate">检查更新</button></div>
            <div class="hint" style="padding-top:8px;">若手机上看到的仍是旧版，点「检查更新」会清除缓存并重新加载（不影响你的数据）。</div>
          </div>
          <div class="set-group"><h4>数据备份</h4>
            <div class="set-row-item"><div><div class="sri-t">导出全部数据</div><div class="sri-d">打包所有模块数据为 JSON 文件下载</div></div><button class="btn btn-ghost" id="sExport">导出</button></div>
            <div class="set-row-item"><div><div class="sri-t">导入数据</div><div class="sri-d">选择 JSON 文件，合并覆盖到本机</div></div><button class="btn btn-ghost" id="sImport">导入</button></div>
          </div>
          <div class="set-group"><h4>危险操作</h4>
            <div class="set-row-item"><div><div class="sri-t">清空全部数据</div><div class="sri-d">删除本工具箱在本机的所有数据，不可恢复</div></div><button class="btn btn-danger" id="sClear">清空</button></div>
          </div>
          <div class="set-group"><h4>存储概览</h4><div id="sOverview" class="hint"></div></div>
        </div>
        <input type="file" id="sFile" accept="application/json,.json" class="hidden">`;
      bindSettings(root);
      bound=true;
    }
    renderOverview();
    renderVersion();
  };

  // 显示应用版本 + Service Worker 实际缓存版本（用于核对是否真的更新了）
  function renderVersion(){
    const el=document.getElementById('sVersion'); if(!el) return;
    const app=window.APP_VERSION||'未知';
    el.textContent=`应用 ${app}`;
    if(!('serviceWorker' in navigator) || !navigator.serviceWorker.controller){
      el.textContent=`应用 ${app} · 未启用离线缓存`;
      return;
    }
    // 向 SW 查询它自己的版本号
    try{
      const ch=new MessageChannel();
      const timer=setTimeout(()=>{},1500);
      navigator.serviceWorker.addEventListener('message',function h(ev){
        if(ev.data && ev.data.type==='VERSION'){
          clearTimeout(timer);
          el.textContent=`应用 ${app} · 缓存 ${ev.data.version}`;
          navigator.serviceWorker.removeEventListener('message',h);
        }
      });
      navigator.serviceWorker.controller.postMessage({type:'GET_VERSION'});
    }catch(e){}
  }

  function renderOverview(){
    const keys=Storage.keys();
    const all=Storage.exportAll();
    const bytes=Object.values(all).reduce((s,v)=>s+(v||'').length,0);
    const map={ 'reading_data':'读书','fitness_workouts':'健身·训练','fitness_exercises':'健身·动作库','fitness_active':'健身·进行中','fitness_schema':'健身·版本','body_weights':'身体·体重','habits_config':'习惯·定义','habits_log':'习惯·打卡','goals_config':'目标·定义','goals_checkin_log':'目标·打卡','goals_history':'目标·历史' };
    const lines=keys.map(k=>{ const short=k.replace(Storage.NS,''); return `${map[short]||short}`; });
    const memWarn = Storage.available ? '' : '<br><span style="color:var(--danger)">注意：当前环境本地存储不可用，数据仅临时保存在内存中（刷新或下载后打开即正常）。</span>';
    document.getElementById('sOverview').innerHTML = (keys.length
      ? `已存储 ${keys.length} 项 · 约 ${(bytes/1024).toFixed(1)} KB<br>${lines.join('、')}`
      : '暂无数据') + memWarn;
  }

  function bindSettings(root){
    // 检查更新：注销 SW、清空缓存、硬刷新（数据不受影响）
    root.querySelector('#sUpdate').addEventListener('click',()=>{
      toast('正在清除缓存并重新加载…');
      setTimeout(()=>{ if(typeof window.forceUpdate==='function') window.forceUpdate(); else location.reload(); },600);
    });
    // 导出
    root.querySelector('#sExport').addEventListener('click',()=>{
      const payload={ app:'personal-toolbox', version:1, exportedAt:new Date().toISOString(), data:Storage.exportAll() };
      const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
      const url=URL.createObjectURL(blob); const a=document.createElement('a');
      a.href=url; a.download=`toolbox-backup-${U.today()}.json`; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
      toast('已导出备份文件');
    });
    // 导入
    const file=root.querySelector('#sFile');
    root.querySelector('#sImport').addEventListener('click',()=>file.click());
    file.addEventListener('change',()=>{
      const f=file.files[0]; if(!f)return;
      const reader=new FileReader();
      reader.onload=()=>{
        try{
          const parsed=JSON.parse(reader.result);
          const data=parsed.data||parsed;   // 兼容直接是 data 的情况
          const n=Storage.importAll(data);
          toast(`已导入 ${n} 项数据`);
          // 重置各模块绑定状态并刷新当前视图
          location.reload();
        }catch(err){ toast('文件解析失败，请确认是导出的 JSON'); }
        file.value='';
      };
      reader.readAsText(f);
    });
    // 清空（两步）
    let armed=false,t;
    root.querySelector('#sClear').addEventListener('click',(e)=>{
      const btn=e.target;
      if(!armed){ armed=true; btn.classList.add('armed'); btn.textContent='确认清空？不可恢复'; clearTimeout(t); t=setTimeout(()=>{armed=false;btn.classList.remove('armed');btn.textContent='清空';},3500); return; }
      Storage.clear(); armed=false; btn.classList.remove('armed'); btn.textContent='清空'; toast('已清空全部数据'); location.reload();
    });
  }
})();
</script>


<!-- =========================================================================
     启动应用
========================================================================= -->
<script>
  /* 应用版本号：每次发布新版本时同步修改，用于设置页显示与核对 */
  window.APP_VERSION = 'v3 · 2026-07';

  App.boot();

  /* ===== Service Worker 注册与自动更新 =====
     仅在 http/https 下注册（file:// 直接打开会跳过） */
  if ('serviceWorker' in navigator && location.protocol.indexOf('http') === 0) {
    window.addEventListener('load', () => {
      // updateViaCache:'none' —— 不允许浏览器用 HTTP 缓存里的旧 sw.js
      navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' }).then(reg => {
        // 每次打开应用主动检查一次更新
        reg.update().catch(() => {});

        // 发现新版本 → 装好后提示并刷新
        reg.addEventListener('updatefound', () => {
          const sw = reg.installing;
          if (!sw) return;
          sw.addEventListener('statechange', () => {
            if (sw.state === 'installed' && navigator.serviceWorker.controller) {
              // 已有旧版在控制页面，说明这是一次“更新”
              sw.postMessage({ type: 'SKIP_WAITING' });
              if (typeof toast === 'function') toast('已下载新版本，正在刷新…');
              setTimeout(() => location.reload(), 800);
            }
          });
        });
      }).catch(() => {});

      // 新 SW 接管后自动刷新一次（防重复刷新）
      let reloaded = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (reloaded) return;
        reloaded = true;
        location.reload();
      });
    });
  }

  /* 强制更新：注销 SW + 清空所有缓存 + 硬刷新（设置页调用） */
  window.forceUpdate = async function () {
    try {
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(r => r.unregister()));
      }
      if (window.caches) {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
      }
    } catch (e) { /* 忽略 */ }
    // 带时间戳绕过 HTTP 缓存
    location.replace(location.pathname + '?u=' + Date.now());
  };
</script>
</body>
</html>
